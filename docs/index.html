<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tacktic Win</title>
  <meta name="description" content="Tacktic Win legal information">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8f4;
      --fg: #1b1d1a;
      --muted: #5a6258;
      --card: #ffffff;
      --accent: #245b3a;
      --border: #d8dfd4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111411;
        --fg: #e5e8e1;
        --muted: #b6beb2;
        --card: #191d18;
        --accent: #9bd5a7;
        --border: #344037;
      }
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px;
    }

    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 6vw, 48px);
      line-height: 1.1;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Tacktic Win</h1>
      <p>Legal information for the Tacktic Win Android application.</p>
      <a href="./privacy-policy.html">Privacy Policy</a>
    </section>
  </main>
</body>
</html>
